<!DOCTYPE html>
<html>
<head>
  <title>D&D Library</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 220px);
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }

    .placeholder {
      width: 100%;
      height: 280px;
      border-radius: 6px;
      background: linear-gradient(135deg, #333, #111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #aaa;
    }

    .title {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>D&D Library</h1>
  <div class="grid" id="grid"></div>

  <script>
    async function loadLibrary() {
      const res = await fetch("library.json");
      const data = await res.json();
      const grid = document.getElementById("grid");

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        let visual;

        if (item.cover) {
          const img = document.createElement("img");

          img.loading = "lazy"; // ⚡ only loads when visible
          img.alt = item.name;

          // show placeholder first
          const placeholder = createPlaceholder(item.name);
          card.appendChild(placeholder);

          img.onload = () => {
            placeholder.replaceWith(img);
          };

          img.onerror = () => {
            placeholder.textContent = "Image failed";
          };

          img.src = item.cover;

          visual = img;

        } else {
          visual = createPlaceholder(item.name);
          card.appendChild(visual);
        }

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = item.name;

        card.appendChild(title);
        grid.appendChild(card);

        // 🚀 instant open (fastest possible)
        card.onclick = () => {
          window.open(item.file, "_blank");
        };
      });
    }

    function createPlaceholder(name) {
      const div = document.createElement("div");
      div.className = "placeholder";
      div.textContent = name;
      return div;
    }

    loadLibrary();
  </script>
</body>
</html>
