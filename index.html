<!DOCTYPE html>
<html>
<head>
  <title>D&D Library</title>

  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #f5e6c8;
      text-align: center;
    }

    h1 {
      margin: 30px 0 10px;
      font-size: 42px;
      letter-spacing: 2px;
      color: #e0c27a;
      text-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
    }

    .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      justify-content: center;
      padding: 20px;
      align-items: end;
      background: url('https://i.imgur.com/d8OaWkA.png'); /* subtle bookshelf texture, can replace with your own */
      background-size: cover;
      background-repeat: repeat-x;
      background-position: bottom;
      min-height: 400px;
    }

    .card {
      background: linear-gradient(145deg, #1c1c1c, #121212);
      border-radius: 6px;
      padding: 5px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: rotateZ(-1deg); /* slight tilt for bookshelf look */
      box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    }

    .card:nth-child(3n) { transform: rotateZ(1deg); } /* alternating tilt */

    .card:hover {
      transform: rotateZ(0deg) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      filter: brightness(0.95);
      transition: transform 0.3s, filter 0.3s;
    }

    .card:hover img {
      filter: brightness(1.05);
      transform: translateY(-5px);
    }

    .placeholder {
      width: 100%;
      height: 220px;
      border-radius: 4px;
      background: linear-gradient(135deg, #2a2a2a, #111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #777;
      text-align: center;
      padding: 10px;
    }

    .title {
      margin-top: 6px;
      font-size: 14px;
      color: #e6d3a3;
      text-align: center;
      word-break: break-word;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        padding: 10px;
        min-height: 300px;
      }

      .card img, .placeholder {
        height: 180px;
      }

      .title {
        font-size: 12px;
      }
    }

    /* optional sparkle particles removed for clarity on mobile */
  </style>
</head>

<body>

  <h1>Arcane Library</h1>
  <div class="subtitle">Ancient Tomes of Knowledge</div>

  <div class="grid" id="grid"></div>

  <script>
    async function loadLibrary() {
      const res = await fetch("library.json");
      const data = await res.json();
      const grid = document.getElementById("grid");

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        if (item.cover) {
          const img = document.createElement("img");
          img.loading = "lazy";
          img.alt = item.name;
          img.src = `covers/${item.cover}`;

          img.onerror = () => {
            const placeholder = document.createElement("div");
            placeholder.className = "placeholder";
            placeholder.textContent = item.name;
            img.replaceWith(placeholder);
          };

          card.appendChild(img);
        } else {
          const placeholder = document.createElement("div");
          placeholder.className = "placeholder";
          placeholder.textContent = item.name;
          card.appendChild(placeholder);
        }

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = item.name;
        card.appendChild(title);

        grid.appendChild(card);

        card.onclick = () => {
          window.open(item.file, "_blank");
        };
      });
    }

    loadLibrary();
  </script>

</body>
</html>
