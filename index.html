<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

  let currentPDF = null;
  let currentPage = 1;

  async function loadLibrary() {
    const res = await fetch("library.json");
    const data = await res.json();
    const grid = document.getElementById("grid");

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const canvas = document.createElement("canvas");
      const title = document.createElement("div");

      title.className = "title";
      title.textContent = item.name;

      card.appendChild(canvas);
      card.appendChild(title);
      grid.appendChild(card);

      card.onclick = () => openViewer(item.file);

      // ⚡ FAST thumbnail (low quality first)
      renderThumbnail(item.file, canvas);
    });
  }

  async function renderThumbnail(url, canvas) {
    try {
      const pdf = await pdfjsLib.getDocument({
        url: url,
        rangeChunkSize: 65536 // streaming chunks
      }).promise;

      const page = await pdf.getPage(1);

      // ⚡ super fast preview
      let viewport = page.getViewport({ scale: 0.3 });
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      await page.render({
        canvasContext: canvas.getContext("2d"),
        viewport: viewport
      }).promise;

      // 🔥 upgrade quality after
      viewport = page.getViewport({ scale: 0.6 });
      await page.render({
        canvasContext: canvas.getContext("2d"),
        viewport: viewport
      }).promise;

    } catch (err) {
      console.log("Thumbnail failed:", err);
    }
  }

  async function openViewer(url) {
    document.getElementById("viewer").style.display = "flex";

    // show loading instantly
    const canvas = document.getElementById("viewerCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = "20px Arial";
    ctx.fillText("Loading...", 20, 40);

    try {
      const loadingTask = pdfjsLib.getDocument({
        url: url,
        rangeChunkSize: 65536, // ⚡ stream PDF
        disableAutoFetch: false,
        disableStream: false
      });

      currentPDF = await loadingTask.promise;
      currentPage = 1;

      renderPage();

    } catch (err) {
      console.error(err);
    }
  }

  async function renderPage() {
    const page = await currentPDF.getPage(currentPage);
    const canvas = document.getElementById("viewerCanvas");
    const ctx = canvas.getContext("2d");

    // 📏 FIT TO SCREEN
    const containerWidth = window.innerWidth * 0.9;
    const viewport = page.getViewport({ scale: 1 });

    const scale = containerWidth / viewport.width;
    const scaledViewport = page.getViewport({ scale });

    canvas.height = scaledViewport.height;
    canvas.width = scaledViewport.width;

    await page.render({
      canvasContext: ctx,
      viewport: scaledViewport
    }).promise;
  }

  function nextPage() {
    if (currentPDF && currentPage < currentPDF.numPages) {
      currentPage++;
      renderPage();
    }
  }

  function prevPage() {
    if (currentPDF && currentPage > 1) {
      currentPage--;
      renderPage();
    }
  }

  function closeViewer() {
    document.getElementById("viewer").style.display = "none";
    currentPDF = null;
  }

  loadLibrary();
</script>
