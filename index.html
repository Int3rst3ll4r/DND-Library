<!DOCTYPE html>
<html>
<head>
  <title>D&D Library</title>

  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #f5e6c8;
      text-align: center;
    }

    h1 {
      margin: 30px 0 10px;
      font-size: 42px;
      letter-spacing: 2px;
      color: #e0c27a;
      text-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
    }

    .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 220px);
      gap: 25px;
      justify-content: center;
      padding: 20px 40px 40px;
    }

    .card {
      background: linear-gradient(145deg, #1c1c1c, #121212);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 
        0 0 0 rgba(255, 200, 100, 0),
        0 10px 25px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      background: linear-gradient(120deg, transparent, #e0c27a, transparent);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: scale(1.06) translateY(-5px);
      box-shadow: 
        0 0 25px rgba(255, 200, 100, 0.2),
        0 20px 40px rgba(0,0,0,0.8);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      filter: brightness(0.9);
      transition: 0.3s;
    }

    .card:hover img {
      filter: brightness(1.05);
    }

    .placeholder {
      width: 100%;
      height: 280px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2a2a2a, #111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #777;
      text-align: center;
      padding: 10px;
    }

    .title {
      margin-top: 10px;
      font-size: 15px;
      color: #e6d3a3;
    }

    .sparkle {
      position: fixed;
      width: 3px;
      height: 3px;
      background: #e0c27a;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

  <h1>Arcane Library</h1>
  <div class="subtitle">Ancient Tomes of Knowledge</div>

  <div class="grid" id="grid"></div>

  <script>
    async function loadLibrary() {
      const res = await fetch("library.json");
      const data = await res.json();
      const grid = document.getElementById("grid");

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        let visual;

        if (item.cover) {
          const img = document.createElement("img");
          img.loading = "lazy";
          img.alt = item.name;

          // ✅ Load image from local covers folder
          img.src = `covers/${item.cover}`;

          const placeholder = createPlaceholder(item.name);
          card.appendChild(placeholder);

          img.onload = () => {
            placeholder.replaceWith(img);
          };

          img.onerror = () => {
            placeholder.textContent = "Missing Cover";
          };

          visual = img;
        } else {
          visual = createPlaceholder(item.name);
          card.appendChild(visual);
        }

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = item.name;

        card.appendChild(title);
        grid.appendChild(card);

        // Keep PDF links exactly the same
        card.onclick = () => {
          window.open(item.file, "_blank");
        };
      });
    }

    function createPlaceholder(name) {
      const div = document.createElement("div");
      div.className = "placeholder";
      div.textContent = name;
      return div;
    }

    function spawnSparkles() {
      for (let i = 0; i < 20; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (5 + Math.random() * 10) + "s";
        document.body.appendChild(s);
      }
    }

    loadLibrary();
    spawnSparkles();
  </script>

</body>
</html>
